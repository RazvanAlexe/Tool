<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C7NN3GS2XM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-C7NN3GS2XM');
</script>
<body>

    <div class="container">
        <h1>Image Converter</h1>

        <!-- Drag & Drop Zone -->
        <div id="dropZone">Drag & Drop Images Here</div>
        <input type="file" id="fileInput" multiple accept="image/*">

        <div class="selectors">
            <label>Convert from:</label>
            <select id="fromFormat">
                <option value="image/jpeg">JPG</option>
                <option value="image/png">PNG</option>
                <option value="image/webp">WEBP</option>
            </select>

            <label>to:</label>
            <select id="toFormat">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPG</option>
                <option value="image/webp">WEBP</option>
            </select>
        </div>

        <button onclick="convertImages()">Convert</button>

        <!-- Progress -->
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>

        <div id="status"></div>
        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
